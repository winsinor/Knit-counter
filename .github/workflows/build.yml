name: Build KnitCount FAP

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache Flipper SDK
        uses: actions/cache@v4
        with:
          path: ~/.ufbt
          key: ufbt-sdk-${{ runner.os }}-${{ hashFiles('application.fam') }}
          restore-keys: ufbt-sdk-${{ runner.os }}-

      - name: Install ufbt
        run: pip install ufbt

      - name: Build FAP
        run: ufbt

      - name: Upload knitcount.fap
        uses: actions/upload-artifact@v4
        with:
          name: knitcount-fap
          path: dist/knitcount.fap
          retention-days: 90
